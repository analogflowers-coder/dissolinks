name: DissOLinK Link Live Notification

on:
  workflow_run:
    workflows: ["DissOLinK Validate + Smoke Test"]
    types:
      - completed

jobs:
  notify:
    name: Send Link Live Notifications
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read pending notifications
        id: read-notifications
        run: |
          if [ ! -f notifications.json ]; then
            echo "No notifications.json found. Skipping."
            echo "has_pending=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          PENDING=$(python3 -c "import json; d=json.load(open('notifications.json')); print(len(d.get('pending', [])))")
          if [ "$PENDING" = "0" ]; then
            echo "No pending notifications."
            echo "has_pending=false" >> $GITHUB_OUTPUT
          else
            echo "Found $PENDING pending notification(s)."
            echo "has_pending=true" >> $GITHUB_OUTPUT
          fi

      - name: Send email notifications
        if: steps.read-notifications.outputs.has_pending == 'true'
        env:
          SPACEMAIL_PASSWORD: ${{ secrets.SPACEMAIL_PASSWORD }}
        run: |
          python3 << 'EOF'
          import json, subprocess, os, tempfile

          with open('notifications.json') as f:
              data = json.load(f)

          pending = data.get('pending', [])
          sent = []
          failed = []

          for entry in pending:
              email = entry.get('email', '')
              slug = entry.get('slug', '')
              link = entry.get('link', f'https://links.dissoverse.com/{slug}/')
              if not email or '@' not in email:
                  continue

              subject = f'DISS0LINKZ // YOUR LINK IS ACTIVE: links.dissoverse.com/{slug}/'
              body = f'''From: DISSOVERSE NEURAL NETWORK <supportstation@dissoverse.com>
          To: {email}
          Subject: {subject}
          Content-Type: text/plain; charset=utf-8
          MIME-Version: 1.0

          ================================================================
          DISSOVERSE NEURAL NETWORK // DISS0LINKZ
          TRANSMISSION: LINK ACTIVATION CONFIRMED
          ================================================================

          STATUS: **ACTIVE**

          Your DissOLinK short link is now live.

          > LINK:   {link}
          > SLUG:   {slug}
          > STATUS: ONLINE
          > CDN:    PROPAGATED

          Share your link. Break the walled garden.

          ================================================================
          DISSOVERSE NEURAL NETWORK
          supportstation@dissoverse.com
          links.dissoverse.com
          ================================================================
          '''

              with tempfile.NamedTemporaryFile(mode='w', suffix='.txt', delete=False) as tmp:
                  tmp.write(body)
                  tmp_path = tmp.name

              result = subprocess.run([
                  'curl', '--ssl-reqd',
                  '--url', 'smtps://mail.dissoverse.com:465',
                  '--user', f'supportstation@dissoverse.com:{os.environ["SPACEMAIL_PASSWORD"]}',
                  '--mail-from', 'supportstation@dissoverse.com',
                  '--mail-rcpt', email,
                  '--upload-file', tmp_path,
                  '--silent', '--show-error'
              ], capture_output=True, text=True)

              if result.returncode == 0:
                  sent.append(email)
                  print(f'SENT: {email} for {slug}')
              else:
                  failed.append(email)
                  print(f'FAILED: {email} -- {result.stderr}')

              os.unlink(tmp_path)

          # Clear sent notifications, keep failed for retry
          remaining = [e for e in pending if e.get('email') in failed]
          data['pending'] = remaining

          with open('notifications.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f'Summary: {len(sent)} sent, {len(failed)} failed')
          EOF

      - name: Commit cleared notifications
        if: steps.read-notifications.outputs.has_pending == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "DISSOVERSE Actions"
          git add notifications.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(notify): clear sent notifications"
            git push
          fi
