name: DissOLinK Validate + Smoke Test

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Bridge Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all bridge index.html files
        run: |
          ERRORS=0
          for file in $(find . -path './.git' -prune -o -name 'index.html' -print | grep -v '^./index.html'); do
            echo "--- Checking: $file"
            if ! grep -q "BRIDGE ROUTED (INTERNAL)" "$file"; then
              echo "FAIL: Missing BRIDGE ROUTED comment in $file"
              ERRORS=$((ERRORS+1))
            fi
            if ! grep -q "window.location.replace" "$file"; then
              echo "FAIL: Missing redirect script in $file"
              ERRORS=$((ERRORS+1))
            fi
            if ! grep -q "dissoverse.com/pages/go" "$file"; then
              echo "FAIL: Bridge bypasses dissoverse.com/pages/go in $file"
              ERRORS=$((ERRORS+1))
            fi
            if grep -qE "http-equiv=['\"]refresh['\"]" "$file"; then
              echo "FAIL: Direct meta-refresh redirect in $file"
              ERRORS=$((ERRORS+1))
            fi
            if ! grep -q "<noscript>" "$file"; then
              echo "FAIL: Missing noscript fallback in $file"
              ERRORS=$((ERRORS+1))
            fi
            echo "OK: $file"
          done
          if [ $ERRORS -gt 0 ]; then
            echo "VALIDATION FAILED: $ERRORS error(s). Halting."
            exit 1
          fi
          echo "All bridge pages passed validation."

  smoke-test:
    name: Post-Deploy Smoke Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub Pages CDN propagation
        run: sleep 60

      - name: Test all DissOLinK URLs respond 200
        run: |
          URLS=(
            "https://links.dissoverse.com/"
            "https://links.dissoverse.com/itsrockymontana/"
            "https://links.dissoverse.com/ivydelicate/"
            "https://links.dissoverse.com/mainsite/"
            "https://links.dissoverse.com/shop/"
            "https://links.dissoverse.com/shopstore/"
            "https://links.dissoverse.com/all/"
            "https://links.dissoverse.com/main/"
          )
          FAILURES=0
          for url in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url")
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: $url returned HTTP $STATUS"
              FAILURES=$((FAILURES+1))
            else
              echo "OK: $url -> $STATUS"
            fi
          done
          if [ $FAILURES -gt 0 ]; then
            echo "SMOKE TEST FAILED: $FAILURES URL(s) not responding 200."
            exit 1
          fi
          echo "All smoke tests passed. DissOLinK deployment verified."
