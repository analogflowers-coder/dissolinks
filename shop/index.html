<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirecting...</title>
</head>
<body style="background:#000;color:#fff;font-family:monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">
<div id="fallback" style="display:none;text-align:center;padding:24px;">
<p style="color:#00ff41;font-size:16px;margin-bottom:20px;">Open in your browser for the best experience:</p>
<a href="https://dissoverse.com" target="_blank" rel="noopener" style="display:inline-block;padding:18px 48px;border:2px solid #00ff41;color:#00ff41;text-decoration:none;font-size:18px;font-weight:bold;letter-spacing:2px;">OPEN LINK</a>
<p style="font-size:13px;color:#ff9900;margin-top:20px;line-height:1.6;">Tap &#x22EF; (3 dots) &#x2192; Open in Safari</p>
</div>
<script>
(function(){
var TARGET="https://dissoverse.com";
var ua=navigator.userAgent||navigator.vendor||window.opera;
var isInstagram=ua.indexOf("Instagram")>-1;
var isFacebook=(/FBAN|FBAV|FB_IAB/).test(ua);
var isTikTok=(/musical_ly|BytedanceWebview|TikTok/).test(ua);
var isTwitter=ua.indexOf("Twitter")>-1;
var isSnapchat=ua.indexOf("Snapchat")>-1;
var isLinkedIn=ua.indexOf("LinkedInApp")>-1;
var isIAB=isInstagram||isFacebook||isTikTok||isTwitter||isSnapchat||isLinkedIn;
var isIOS=(/iPhone|iPad|iPod/).test(ua);
var isAndroid=(/Android/).test(ua);
if(!isIAB){window.location.replace(TARGET);return;}
if(isAndroid){window.location.href="intent://"+TARGET.replace(/^https?:\/\//,"")+"#Intent;scheme=https;package=com.android.chrome;end;";setTimeout(function(){document.getElementById("fallback").style.display="block";},2000);return;}
if(isIOS){
window.location.href="x-safari-"+TARGET;
setTimeout(function(){
var id="dissolink-"+Math.random().toString(36).substring(2);
window.location.href="shortcuts://x-callback-url/run-shortcut?name="+id+"&x-error="+encodeURIComponent(TARGET);
},300);
setTimeout(function(){document.getElementById("fallback").style.display="block";},2500);
return;
}
window.location.href=TARGET;
setTimeout(function(){document.getElementById("fallback").style.display="block";},2000);
})();
</script>
</body></html>
