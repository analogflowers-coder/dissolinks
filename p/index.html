<style>
:root{--accent:#00ff41;--accent-rgb:0,255,65;--bg:#050505;--neon-rgb:0,255,65;--matrix-color:#00ff41;--matrix-fade:rgba(0,255,65,0.4);--text:#fff;--text-dim:rgba(255,255,255,0.55);--glow:0 0 20px rgba(var(--accent-rgb),0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono','Courier New',monospace;min-height:100vh;overflow-x:hidden}

/* CRT Scanlines */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:9999}
body::after{content:'';position:fixed;inset:0;background:rgba(var(--accent-rgb),0.006);pointer-events:none;z-index:9998;animation:flicker 0.15s infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.97}}

/* Background canvas */
#dv-matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.15}

.avatar-placeholder{width:120px;height:120px;border-radius:50%;border:3px solid var(--accent);background:var(--bg);display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--glow)}
.avatar-placeholder svg{width:48px;height:48px;stroke:var(--accent);opacity:0.4}
.display-name{font-family:'VT323',monospace;font-size:28px;letter-spacing:4px;margin-top:16px;color:var(--accent);text-shadow:0 0 20px rgba(var(--accent-rgb),0.4)}

.bio{font-size:14px;letter-spacing:1px;line-height:1.8;color:rgba(255,255,255,0.7);margin-top:12px;max-width:420px;display:inline-block}

/* Social icons */
.socials{display:flex;gap:10px;justify-content:center;margin-top:18px}
.social-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--accent-rgb),0.3);background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all 0.3s;backdrop-filter:blur(8px);color:var(--accent)}
.social-btn:hover{border-color:var(--accent);box-shadow:var(--glow);transform:scale(1.15);color:#fff}
.social-btn svg{width:18px;height:18px}
.social-btn span{font-family:'VT323',monospace;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px}

/* Link tiles */
.tiles{margin-top:28px;display:flex;flex-direction:column;gap:10px}
.tile{width:100%;border:1px solid rgba(var(--accent-rgb),0.2);background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);text-decoration:none;transition:all 0.3s;display:block;padding:16px 20px}
.tile:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(var(--accent-rgb),0.25),0 4px 20px rgba(0,0,0,0.4);transform:translateY(-2px)}
.tile-inner{display:flex;align-items:center;justify-content:space-between}
.tile-title{font-family:'VT323',monospace;font-size:16px;letter-spacing:3px;color:var(--text);text-shadow:0 0 8px rgba(var(--accent-rgb),0.2)}
.tile-arrow{font-size:14px;color:var(--accent);opacity:0.5}

/* Audio player */
.audio-section{margin-top:20px;border:1px solid rgba(var(--accent-rgb),0.15);background:rgba(0,0,0,0.4);padding:14px 16px;backdrop-filter:blur(8px)}
.audio-section audio{width:100%;height:32px;filter:sepia(1) hue-rotate(90deg) saturate(3)}

/* Footer */
.page-footer{text-align:center;margin-top:40px;padding:20px 0;border-top:1px solid rgba(var(--accent-rgb),0.08)}
.page-footer a{text-decoration:none;font-family:'VT323',monospace;font-size:12px;letter-spacing:4px;color:rgba(var(--accent-rgb),0.3);transition:color 0.3s}
.page-footer a:hover{color:var(--accent)}
.powered{font-size:7px;letter-spacing:4px;color:rgba(255,255,255,0.12);margin-top:8px}

/* Not found */
.not-found{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;text-align:center;position:relative;z-index:10}
.not-found h1{font-family:'VT323',monospace;font-size:80px;letter-spacing:8px;color:var(--accent);text-shadow:0 0 40px rgba(var(--accent-rgb),0.4)}
.not-found p{font-size:11px;letter-spacing:4px;color:var(--text-dim)}
.not-found a{color:var(--accent);font-size:10px;letter-spacing:2px;text-decoration:none;border:1px solid rgba(var(--accent-rgb),0.3);padding:8px 20px;transition:all 0.3s}
.not-found a:hover{background:rgba(var(--accent-rgb),0.1);box-shadow:var(--glow)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:10}
.loading-spinner{width:40px;height:40px;border:2px solid rgba(var(--accent-rgb),0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.5s ease-out forwards;opacity:0}

/* Glitch hover */
@keyframes avatarGlitch{0%,100%{filter:drop-shadow(0 0 8px rgba(var(--accent-rgb),0.4))}25%{filter:drop-shadow(-2px 0 rgba(255,0,0,0.5)) drop-shadow(2px 0 rgba(0,255,255,0.5))}50%{filter:drop-shadow(0 0 15px rgba(var(--accent-rgb),0.7))}75%{filter:drop-shadow(1px 0 rgba(255,0,255,0.4)) drop-shadow(-1px 0 rgba(0,255,0,0.4))}}
.avatar:hover,.avatar-placeholder:hover{animation:avatarGlitch 0.4s ease}

@media(min-width:768px){.page-wrap{max-width:540px}.avatar{width:130px;height:130px}.display-name{font-size:32px}.tile-title{font-size:18px}}

<body>

<script>
firebase.initializeApp({

});
var db = firebase.firestore();

// Get username from URL query param (?u=username) or path
var urlParams = new URLSearchParams(window.location.search);
var username = urlParams.get('u');
if (!username) {
  var pathParts = window.location.pathname.replace(/\/$/,'').split('/');
  username = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
}

if (!username || username === 'p') {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('not-found').style.display = 'flex';
} else {
  db.collection('users').where('username','==',username).where('status','==','approved').limit(1).get()
    .then(function(snap) {
      document.getElementById('loading').style.display = 'none';
      if (snap.empty) {
        document.getElementById('not-found').style.display = 'flex';
        return;
      }
      renderPage(snap.docs[0].data());
    })
    .catch(function(err) {
      console.error('Firestore query error:', err);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('not-found').style.display = 'flex';
    });
}

function esc(str) { var d=document.createElement('div'); d.textContent=str||''; return d.innerHTML; }
function sanitizeUrl(url) {
  if (!url) return '';
  url = url.trim();
  if (url === '#') return '#';
  if (!url.match(/^[a-zA-Z]+:\/\//)) url = 'https://' + url;
  if (!url.match(/^https?:\/\//i)) return '';
  return url;
}

function hexToRgb(hex) {
  hex = (hex||'#00ff41').replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return parseInt(hex.substring(0,2),16)+','+parseInt(hex.substring(2,4),16)+','+parseInt(hex.substring(4,6),16);
}

function renderPage(userData) {
  var c = userData.config || {};
  var color = c.color || '#00ff41';
  var rgb = hexToRgb(color);

  // Apply theme to CSS vars (backgrounds.js reads these)
  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent-rgb', rgb);
  document.documentElement.style.setProperty('--neon', color);

  document.documentElement.style.setProperty('--matrix-color', color);

  // Page title + OG
  var name = c.displayName || userData.username || username;

  ogMeta.setAttribute('content', name + ' // Diss0LinkZ');
  document.head.appendChild(ogMeta);

  var content = document.getElementById('page-content');
  var html = '';

  // ── PROFILE ──
  html += '<div class="profile fade-in">';
  if (c.avatar) {
    html += '<img class="avatar" src="'+esc(c.avatar)+'" alt="'+esc(name)+'">';
  } else {
    html += '<div class="avatar-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';

  if (c.displayName) {

  }
  var handle = c.handle || ('@' + (userData.username || username));
  html += '<div class="handle">'+esc(handle)+'</div>';
  if (c.bio) {
    html += '<div class="bio">'+esc(c.bio)+'</div>';
  }

  // ── SVG SOCIAL ICONS — accent color synced via currentColor ──

  var ICONS = {
    onlyfans:'<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>',
    fansly:'<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>',
    sextpanther:'<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
    pornhub:'<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="2" y="6" width="20" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><polygon points="10,9 16,12 10,15" fill="currentColor"/></svg>',
    manyvids:'<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6zm3 2l6 4-6 4V8z"/></svg>',
    instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>',
    twitter:'<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
    tiktok:'<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9a6.27 6.27 0 00-.79-.05A6.34 6.34 0 003.15 15.3a6.34 6.34 0 0010.86-4.43V7.56a8.16 8.16 0 005.58 2.18V6.69z"/></svg>',

  };

  // Build socials array — adult platforms first, then mainstream
  var socials = [];
  if (c.onlyfans) socials.push({key:'onlyfans',url:c.onlyfans});
  if (c.fansly) socials.push({key:'fansly',url:c.fansly});
  if (c.sextpanther) socials.push({key:'sextpanther',url:c.sextpanther});
  if (c.pornhub) socials.push({key:'pornhub',url:c.pornhub});
  if (c.manyvids) socials.push({key:'manyvids',url:c.manyvids});
  if (c.instagram) socials.push({key:'instagram',url:c.instagram});

  if (c.tiktok) socials.push({key:'tiktok',url:c.tiktok});
  if (c.youtube) socials.push({key:'youtube',url:c.youtube});
  if (c.spotify) socials.push({key:'spotify',url:c.spotify});
  // Fallback: check old socialLinks schema
  if (!socials.length && c.socialLinks) {
    if (c.socialLinks.instagram) socials.push({key:'instagram',url:c.socialLinks.instagram});
    if (c.socialLinks.x) socials.push({key:'twitter',url:c.socialLinks.x});

    if (c.socialLinks.youtube) socials.push({key:'youtube',url:c.socialLinks.youtube});
    if (c.socialLinks.spotify) socials.push({key:'spotify',url:c.socialLinks.spotify});
  }
  if (socials.length) {
    html += '<div class="socials">';
    socials.forEach(function(s) {
      var icon = ICONS[s.key] || '<span style="font-size:10px;font-weight:700;letter-spacing:1px">'+s.key.substring(0,2).toUpperCase()+'</span>';
      html += '<a class="social-btn" href="'+esc(sanitizeUrl(s.url))+'" target="_blank" rel="noopener" title="'+esc(s.key)+'">'+icon+'</a>';
    });
    html += '</div>';
  }
  // Follower count — only show if at least one platform has a count
  var fc = c.followerCounts || {};
  var totalFollowers = (fc.instagram||0) + (fc.twitter||0) + (fc.tiktok||0) + (fc.youtube||0) + (fc.spotify||0);
  if (totalFollowers > 0) {
    var formatted = totalFollowers >= 1000000 ? (totalFollowers/1000000).toFixed(1)+'M' : totalFollowers >= 1000 ? (totalFollowers/1000).toFixed(1)+'K' : totalFollowers.toString();

  // ── LINK TILES ──
  if (c.links && c.links.length) {
    html += '<div class="tiles">';

  // ── AUDIO ──
  var audioUrl = c.audio || c.audioUrl || '';
