<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>if(location.hostname==='links.dissoverse.com')location.replace('https://diss0linkz.com'+location.pathname+location.search);</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DISS0LINKZ // COMMAND CENTER</title>
<link rel="apple-touch-icon" sizes="180x180" href="https://cdn.shopify.com/s/files/1/0897/5686/0735/files/BIG-DISSOVERSE-APP-LOGO.png?v=1775799330">
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0897/5686/0735/files/BIG-DISSOVERSE-APP-LOGO.png?v=1775799330">
<meta name="robots" content="noindex, nofollow">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root { --neon: #00ff41; --neon-rgb: 0,255,65; --bg: #0a0a0a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--neon); font-family:'Courier New',monospace; min-height:100vh; }
.admin-gate { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; }
.admin-gate input { background:transparent; border:1px solid rgba(var(--neon-rgb),0.3); color:var(--neon); font-family:'Courier New',monospace; font-size:13px; padding:10px 14px; width:300px; letter-spacing:1px; }
.admin-gate input:focus { outline:none; border-color:var(--neon); box-shadow:0 0 10px rgba(var(--neon-rgb),0.2); }
.admin-gate button { background:rgba(var(--neon-rgb),0.1); border:1px solid rgba(var(--neon-rgb),0.4); color:var(--neon); font-family:'Courier New',monospace; font-size:11px; letter-spacing:3px; padding:10px 24px; cursor:pointer; }
.admin-gate button:hover { background:rgba(var(--neon-rgb),0.2); border-color:var(--neon); }
.admin-header { padding:16px 24px; border-bottom:1px solid rgba(var(--neon-rgb),0.15); display:flex; justify-content:space-between; align-items:center; }
.admin-header h1 { font-size:14px; letter-spacing:4px; }
.admin-header button { background:none; border:1px solid rgba(var(--neon-rgb),0.3); color:var(--neon); font-family:'Courier New',monospace; font-size:9px; letter-spacing:2px; padding:6px 14px; cursor:pointer; }
.admin-content { padding:24px; }
.admin-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { border:1px solid rgba(var(--neon-rgb),0.15); padding:16px; text-align:center; }
.stat-card .num { font-size:28px; letter-spacing:2px; margin-bottom:4px; }
.stat-card .label { font-size:7px; letter-spacing:3px; color:rgba(var(--neon-rgb),0.45); }
.section-title { font-size:9px; letter-spacing:4px; color:rgba(var(--neon-rgb),0.5); margin:20px 0 12px; border-bottom:1px solid rgba(var(--neon-rgb),0.08); padding-bottom:6px; }
.user-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border:1px solid rgba(var(--neon-rgb),0.1); margin-bottom:4px; font-size:11px; }
.user-row:hover { border-color:rgba(var(--neon-rgb),0.3); background:rgba(var(--neon-rgb),0.02); }
.user-info { display:flex; flex-direction:column; gap:2px; }
.user-info .username { font-size:13px; letter-spacing:2px; }
.user-info .email { font-size:9px; color:rgba(var(--neon-rgb),0.4); letter-spacing:1px; }
.user-info .date { font-size:8px; color:rgba(var(--neon-rgb),0.25); }
.user-actions { display:flex; gap:6px; }
.user-actions button { font-family:'Courier New',monospace; font-size:8px; letter-spacing:2px; padding:5px 10px; cursor:pointer; border:1px solid; background:transparent; }
.btn-approve { color:#00ff41; border-color:#00ff41; }
.btn-approve:hover { background:rgba(0,255,65,0.15); }
.btn-deny { color:#ff4444; border-color:#ff4444; }
.btn-deny:hover { background:rgba(255,68,68,0.15); }
.btn-suspend { color:#ffaa00; border-color:#ffaa00; }
.btn-suspend:hover { background:rgba(255,170,0,0.15); }
.status-badge { font-size:8px; letter-spacing:2px; padding:3px 8px; display:inline-block; }
.status-pending { color:#ffaa00; border:1px solid #ffaa00; }
.status-approved { color:#00ff41; border:1px solid #00ff41; }
.status-suspended { color:#ff4444; border:1px solid #ff4444; }
#admin-panel { display:none; }
.empty-state { text-align:center; padding:40px; color:rgba(var(--neon-rgb),0.25); font-size:10px; letter-spacing:3px; }
@media(max-width:768px) { .user-row { flex-direction:column; gap:8px; align-items:flex-start; } .admin-stats { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>

<!-- ADMIN LOGIN GATE -->
<div id="admin-gate" class="admin-gate">
  <div style="font-size:10px; letter-spacing:4px; color:rgba(var(--neon-rgb),0.4); margin-bottom:16px;">>> COMMAND CENTER // AUTHORIZED PERSONNEL ONLY</div>
  <input type="email" id="admin-email" placeholder="OPERATOR EMAIL">
  <input type="password" id="admin-pass" placeholder="CLEARANCE CODE">
  <button onclick="adminLogin()">&#9654; AUTHENTICATE</button>
  <div id="admin-error" style="font-size:9px; color:#ff4444; letter-spacing:1px; min-height:16px;"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <h1>>> DISS0LINKZ COMMAND CENTER</h1>
    <button onclick="adminLogout()">DISCONNECT</button>
  </div>
  <div class="admin-content">
    <div class="admin-stats">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">TOTAL OPERATIVES</div></div>
      <div class="stat-card"><div class="num" id="stat-pending">0</div><div class="label">PENDING CLEARANCE</div></div>
      <div class="stat-card"><div class="num" id="stat-approved">0</div><div class="label">ACTIVE</div></div>
      <div class="stat-card"><div class="num" id="stat-suspended">0</div><div class="label">SUSPENDED</div></div>
    </div>

    <div class="section-title">// PENDING CLEARANCE REQUESTS</div>
    <div id="pending-list"><div class="empty-state">NO PENDING REQUESTS</div></div>

    <div class="section-title">// ACTIVE OPERATIVES</div>
    <div id="approved-list"><div class="empty-state">NO ACTIVE OPERATIVES</div></div>

    <div class="section-title">// SUSPENDED</div>
    <div id="suspended-list"><div class="empty-state">NONE</div></div>
  </div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyBJW5JIetcStxkvZoqpk3IwQbUY7BI9-JI",
  authDomain: "diss0linkz.firebaseapp.com",
  projectId: "diss0linkz",
  storageBucket: "diss0linkz.firebasestorage.app",
  messagingSenderId: "50981881114",
  appId: "1:50981881114:web:4392a0aa58399a627f18a3"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

// Admin email whitelist — ONLY these emails can access the admin panel
var ADMIN_EMAILS = ['dissoverse@gmail.com'];

function adminLogin() {
  var email = document.getElementById('admin-email').value;
  var pass = document.getElementById('admin-pass').value;
  var err = document.getElementById('admin-error');
  if (!email || !pass) { err.textContent = '> ALL FIELDS REQUIRED'; return; }
  if (!ADMIN_EMAILS.includes(email.toLowerCase())) { err.textContent = '> UNAUTHORIZED OPERATIVE'; return; }
  auth.signInWithEmailAndPassword(email, pass)
    .then(function() { loadAdminPanel(); })
    .catch(function(e) { err.textContent = '> AUTH FAILED: ' + e.message; });
}

function adminLogout() {
  auth.signOut().then(function() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('admin-gate').style.display = 'flex';
  });
}

// Check if already logged in
auth.onAuthStateChanged(function(user) {
  if (user && ADMIN_EMAILS.includes(user.email.toLowerCase())) {
    loadAdminPanel();
  }
});

function loadAdminPanel() {
  document.getElementById('admin-gate').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  loadUsers();
}

function loadUsers() {
  db.collection('users').orderBy('created', 'desc').onSnapshot(function(snap) {
    var pending = [], approved = [], suspended = [];
    var total = 0;
    snap.forEach(function(doc) {
      var d = doc.data();
      d.id = doc.id;
      total++;
      if (d.status === 'pending') pending.push(d);
      else if (d.status === 'approved') approved.push(d);
      else if (d.status === 'suspended') suspended.push(d);
    });
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-approved').textContent = approved.length;
    document.getElementById('stat-suspended').textContent = suspended.length;
    renderList('pending-list', pending, 'pending');
    renderList('approved-list', approved, 'approved');
    renderList('suspended-list', suspended, 'suspended');
  });
}

function renderList(containerId, users, status) {
  var el = document.getElementById(containerId);
  if (!users.length) { el.innerHTML = '<div class="empty-state">NONE</div>'; return; }
  el.innerHTML = '';
  users.forEach(function(u) {
    var row = document.createElement('div');
    row.className = 'user-row';
    var created = u.created ? new Date(u.created.seconds * 1000).toLocaleString() : '—';
    var actions = '';
    if (status === 'pending') {
      actions = '<button class="btn-approve" onclick="updateStatus(\'' + u.id + '\',\'approved\')">APPROVE</button>' +
                '<button class="btn-deny" onclick="updateStatus(\'' + u.id + '\',\'denied\')">DENY</button>';
    } else if (status === 'approved') {
      actions = '<button class="btn-suspend" onclick="updateStatus(\'' + u.id + '\',\'suspended\')">SUSPEND</button>';
    } else if (status === 'suspended') {
      actions = '<button class="btn-approve" onclick="updateStatus(\'' + u.id + '\',\'approved\')">REACTIVATE</button>';
    }
    row.innerHTML = '<div class="user-info">' +
      '<span class="username">' + (u.username || u.email || 'UNKNOWN') + '</span>' +
      '<span class="email">' + (u.email || '') + '</span>' +
      '<span class="date">REGISTERED: ' + created + '</span>' +
      '</div>' +
      '<div class="user-actions"><span class="status-badge status-' + status + '">' + status.toUpperCase() + '</span>' + actions + '</div>';
    el.appendChild(row);
  });
}

function updateStatus(userId, newStatus) {
  db.collection('users').doc(userId).update({
    status: newStatus,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: auth.currentUser.email
  }).then(function() {
    console.log('Status updated: ' + userId + ' -> ' + newStatus);
  }).catch(function(e) {
    alert('Error: ' + e.message);
  });
}
</script>
</body>
</html>
