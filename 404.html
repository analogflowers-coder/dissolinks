<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISS0LINKZ // SIGNAL NOT FOUND</title>
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0897/5686/0735/files/BIG-DISSOVERSE-APP-LOGO.png?v=1775799330">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--neon:#00ff41;--neon-rgb:0,255,65;--bg:#050505}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--neon);font-family:'Share Tech Mono','Courier New',monospace;min-height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:9999}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.15}
.error-wrap{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;text-align:center;padding:20px}
.error-code{font-family:'VT323',monospace;font-size:120px;font-weight:bold;letter-spacing:12px;color:var(--neon);text-shadow:0 0 40px rgba(var(--neon-rgb),0.4),0 0 80px rgba(var(--neon-rgb),0.15);line-height:1;animation:glowPulse 3s ease-in-out infinite}
.error-msg{font-family:'VT323',monospace;font-size:18px;letter-spacing:5px;color:rgba(var(--neon-rgb),0.5);margin-top:-8px}
.error-detail{font-size:10px;letter-spacing:2px;color:rgba(var(--neon-rgb),0.25);max-width:400px;line-height:1.8;margin-top:8px}
.error-nav{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.error-nav a{color:var(--neon);font-size:10px;letter-spacing:2px;text-decoration:none;border:1px solid rgba(var(--neon-rgb),0.25);padding:8px 20px;transition:all 0.3s}
.error-nav a:hover{border-color:var(--neon);background:rgba(var(--neon-rgb),0.08);box-shadow:0 0 15px rgba(var(--neon-rgb),0.2)}
.blink{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 40px rgba(var(--neon-rgb),0.4),0 0 80px rgba(var(--neon-rgb),0.15)}50%{text-shadow:0 0 60px rgba(var(--neon-rgb),0.6),0 0 120px rgba(var(--neon-rgb),0.25)}}
@media(max-width:480px){.error-code{font-size:80px;letter-spacing:8px}.error-msg{font-size:14px;letter-spacing:3px}}
</style>
<script>
// GitHub Pages 404 — route /p/username/ to the landing page renderer
var path = window.location.pathname;
if (path.indexOf('/p/') === 0) {
  var username = path.replace('/p/','').replace(/\//g,'');
  if (username) {
    window.location.replace('/p/?u=' + username);
  }
}
</script>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="error-wrap" id="error-content">
  <div class="error-code">404</div>
  <div class="error-msg">SIGNAL NOT FOUND<span class="blink">_</span></div>
  <div class="error-detail">THE REQUESTED FREQUENCY DOES NOT EXIST IN THE DISSOVERSE NEURAL NETWORK. VERIFY YOUR COORDINATES AND TRY AGAIN.</div>
  <div class="error-nav">
    <a href="/">&#9664; RETURN TO MAINFRAME</a>
    <a href="https://dissoverse.com">DISSOVERSE.COM &#9654;</a>
  </div>
</div>

<script>
// Minimal matrix rain for 404 page
(function() {
  var canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W, H;
  function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  var fontSize = 14;
  var cols = Math.floor(W/fontSize);
  var drops = [];
  for (var i=0;i<cols;i++) drops[i]=Math.random()*-H/fontSize;
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%ァアィイゥウェエ404ERROR';

  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,W,H);
    for (var i=0;i<cols;i++) {
      var y = drops[i]*fontSize;
      if (drops[i]>0) {
        ctx.fillStyle = drops[i]<2 ? '#ffffff' : '#00ff41';
        ctx.font = fontSize+'px monospace';
        ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*fontSize, y);
      }
      if (y>H && Math.random()>0.975) drops[i]=0;
      drops[i] += 0.4 + Math.random()*0.3;
    }
  }
  setInterval(draw, 55);
})();
</script>
</body>
</html>
