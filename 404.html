<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// GitHub Pages custom 404 — route /p/username/ to the landing page renderer
var path = window.location.pathname;
if (path.indexOf('/p/') === 0) {
  // This is a public landing page request — load the renderer
  var s = document.createElement('script');
  s.textContent = 'window._dvUsername = "' + path.replace('/p/','').replace(/\//g,'') + '";';
  document.head.appendChild(s);
}
</script>
<title>Loading...</title>
<style>
body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.loading { text-align: center; }
.spinner { width: 40px; height: 40px; border: 2px solid rgba(0,255,65,0.15); border-top-color: #00ff41; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.msg { font-size: 10px; letter-spacing: 3px; color: rgba(0,255,65,0.4); }
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <div class="msg">RESOLVING SIGNAL...</div>
</div>
<script>
var path = window.location.pathname;
if (path.indexOf('/p/') === 0) {
  // Redirect to /p/ with username as query param (the renderer reads it)
  window.location.replace('/p/?u=' + path.replace('/p/','').replace(/\//g,''));
} else {
  // Not a /p/ route — show actual 404
  document.querySelector('.loading').innerHTML = '<div style="font-size:60px;font-weight:bold;letter-spacing:8px;margin-bottom:16px">404</div>' +
    '<div style="font-size:11px;letter-spacing:4px;color:rgba(0,255,65,0.5)">SIGNAL NOT FOUND</div>' +
    '<a href="/" style="display:inline-block;margin-top:24px;color:#00ff41;font-size:9px;letter-spacing:2px;text-decoration:none;border:1px solid rgba(0,255,65,0.3);padding:8px 20px">RETURN TO MAINFRAME</a>';
}
</script>
</body>
</html>
